<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CodeReviewAI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0c; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.app-wrap { position: relative; width: 100%; max-width: 1100px; }
.app { background: #0d0d0f; border-radius: 12px; overflow: hidden; border: 0.5px solid #2a2a2e; }
.topbar { display: flex; align-items: center; gap: 0px; padding: 8px 20px; border-bottom: 0.5px solid #2a2a2e; background: #111114; }
.logo { font-size: 14px; font-weight: 500; color: #e8e8f0; }
.logo span { color: #7c6fe0; }
.badge { font-size: 11px; padding: 2px 8px; background: #1e1b3a; color: #a89ff0; border-radius: 20px; border: 0.5px solid #3d3680; }

.toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid #2a2a2e; background: #0f0f12; flex-wrap: wrap; }
.lang-wrap { position: relative; flex: 1; min-width: 180px; }
.lang-search { width: 100%; background: #1a1a1e; color: #c9d1d9; border: 0.5px solid #2a2a2e; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; }
.lang-search:focus { border-color: #7c6fe0; }
.lang-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1e; border: 0.5px solid #2a2a2e; border-radius: 6px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
.lang-dropdown.open { display: block; }
.lang-option { padding: 7px 10px; font-size: 12px; color: #a0a0b0; cursor: pointer; }
.lang-option:hover, .lang-option.selected { background: #2a2550; color: #c9d1d9; }
.lang-option .tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; background: #1e1b3a; color: #7c6fe0; }
.mode-toggle { display: flex; border: 0.5px solid #2a2a2e; border-radius: 6px; overflow: hidden; }
.mode-btn { padding: 6px 12px; font-size: 12px; background: #1a1a1e; color: #666; border: none; cursor: pointer; }
.mode-btn.active { background: #7c6fe0; color: #fff; }
.credit-counter { font-size: 12px; color: #555; white-space: nowrap; margin-left: auto; }
.credit-counter span { color: #7c6fe0; font-weight: 500; }
.body { display: grid; grid-template-columns: 1fr 1fr; min-height: 480px; }
.left-panel { display: flex; flex-direction: column; border-right: 0.5px solid #2a2a2e; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 0.5px solid #2a2a2e; background: #111114; }
.panel-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.editor-wrap { flex: 1; display: flex; overflow: hidden; min-height: 200px; }
.line-numbers { padding: 16px 8px 16px 12px; background: #0a0a0c; color: #333; font-family: monospace; font-size: 13px; line-height: 1.6; text-align: right; user-select: none; min-width: 36px; border-right: 0.5px solid #1a1a1e; }
.code-input { flex: 1; background: #0d0d0f; color: #c9d1d9; font-family: monospace; font-size: 13px; line-height: 1.6; border: none; outline: none; resize: none; padding: 16px; }
.code-input::placeholder { color: #3a3a4a; }
.run-btn { margin: 12px 16px; padding: 10px 0; background: #7c6fe0; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.run-btn:hover { background: #9283f0; }
.run-btn:disabled { background: #3a3460; color: #7070a0; cursor: not-allowed; }
.right-panel { display: flex; flex-direction: column; overflow-y: auto; background: #0d0d0f; min-height: 300px; }
.placeholder { flex: 1; display: flex; align-items: center; justify-content: center; }
.placeholder p { font-size: 13px; color: #333; }
.loading { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid #2a2a2e; border-top-color: #7c6fe0; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: #555; }
.result-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.grade-card { border-radius: 10px; border: 0.5px solid #2a2a2e; padding: 14px 16px; display: flex; align-items: center; gap: 16px; background: #111114; }
.grade-circle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 500; flex-shrink: 0; }
.grade-A { background: #0f2010; color: #60c060; border: 1.5px solid #1e4020; }
.grade-B { background: #0e1a20; color: #60a0c0; border: 1.5px solid #1a3040; }
.grade-C { background: #1e1510; color: #e0a040; border: 1.5px solid #3d2a10; }
.grade-D { background: #1e1010; color: #f07070; border: 1.5px solid #3d1515; }
.grade-label { font-size: 13px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
.score-row { display: flex; gap: 8px; flex-wrap: wrap; }
.score-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.score-pill.good { background: #0f2010; color: #60c060; border: 0.5px solid #1e4020; }
.score-pill.warn { background: #1e1510; color: #e0a040; border: 0.5px solid #3d2a10; }
.score-pill.bad { background: #1e1010; color: #f07070; border: 0.5px solid #3d1515; }
.section { border-radius: 8px; overflow: hidden; border: 0.5px solid #2a2a2e; }
.section-head { padding: 8px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.section-body { padding: 12px; font-size: 13px; line-height: 1.6; color: #b0b0c0; }
.bugs .section-head { background: #1e1212; color: #f07070; }
.security .section-head { background: #1a1510; color: #e0a040; }
.perf .section-head { background: #0f1a10; color: #60c060; }
.explain .section-head { background: #101520; color: #60a0e0; }
.fixed-head { padding: 8px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; background: #111220; color: #7c6fe0; }
.copy-btn { font-size: 11px; padding: 3px 10px; background: #1e1b3a; color: #a89ff0; border: 0.5px solid #3d3680; border-radius: 6px; cursor: pointer; }
.copy-btn:hover { background: #2a2550; }
.fixed-body { font-family: monospace; font-size: 12px; background: #111114; white-space: pre-wrap; word-break: break-word; }
.diff-line { padding: 1px 12px; font-family: monospace; font-size: 12px; line-height: 1.6; }
.diff-line.added { background: #0d1f0d; color: #80c080; }
.diff-line.removed { background: #1f0d0d; color: #c08080; text-decoration: line-through; opacity: 0.6; }
.diff-line.normal { color: #c9d1d9; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot-red { background: #f07070; } .dot-amber { background: #e0a040; } .dot-green { background: #60c060; } .dot-purple { background: #7c6fe0; } .dot-blue { background: #60a0e0; }
.history-bar { border-top: 0.5px solid #2a2a2e; background: #0a0a0c; }
.history-title { padding: 8px 16px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 0.5px solid #1a1a1e; }
.history-list { display: flex; flex-direction: column; max-height: 120px; overflow-y: auto; }
.history-item { padding: 8px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 0.5px solid #1a1a1e; }
.history-item:hover { background: #111114; }
.history-grade { font-size: 12px; font-weight: 500; width: 20px; }
.history-snippet { font-size: 12px; color: #555; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-size: 11px; color: #333; }
.empty-history { padding: 12px 16px; font-size: 12px; color: #333; }
.tos-bar { border-top: 0.5px solid #2a2a2e; padding: 10px 16px; background: #0a0a0c; display: flex; align-items: center; justify-content: center; gap: 16px; }
.tos-link { font-size: 11px; color: #333; cursor: pointer; text-decoration: underline; }
.tos-link:hover { color: #666; }
.modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #111114; border: 0.5px solid #2a2a2e; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto; }
.modal h2 { font-size: 15px; color: #e0e0e0; margin-bottom: 12px; font-weight: 500; }
.modal p { font-size: 13px; color: #888; line-height: 1.7; margin-bottom: 10px; }
.modal-close { margin-top: 16px; padding: 8px 20px; background: #7c6fe0; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
@media (max-width: 700px) {
  .body { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 0.5px solid #2a2a2e; }
  .right-panel { min-height: 300px; }
}
</style>
</head>
<body>
<div class="app-wrap">
<div class="app">
  <div class="topbar">
    <svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg" style="margin-right:10px;">
      <rect x="1" y="4" width="80" height="42" rx="8" fill="#0d0d0f" stroke="#7c6fe0" stroke-width="1.5"/>
      <circle cx="12" cy="14" r="2.5" fill="#f07070"/>
      <circle cx="22" cy="14" r="2.5" fill="#e0a040"/>
      <circle cx="32" cy="14" r="2.5" fill="#60c060"/>
      <text x="16" y="34" font-family="monospace" font-size="12" fill="#7c6fe0">_ review</text>
      <text x="76" y="42" font-family="monospace" font-size="14" font-weight="700" fill="#a89ff0">()</text>
      <text x="84" y="30" font-family="system-ui" font-size="18" font-weight="500" fill="#e8e8f0">CodeReview</text>
      <text x="84" y="50" font-family="system-ui" font-size="20" font-weight="700" fill="#a89ff0">AI</text>
    </svg>
    <div class="badge">powered by Claude</div>
  </div>
  <div class="toolbar">
    <div class="lang-wrap">
      <input class="lang-search" id="langSearch" placeholder="Search language... (e.g. python, react, roblox)" autocomplete="off" onfocus="openDropdown()" oninput="filterLangs()" onblur="setTimeout(closeDropdown, 200)" />
      <div class="lang-dropdown" id="langDropdown"></div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeFixBtn" onclick="setMode('fix')">Fix it</button>
      <button class="mode-btn" id="modeTeachBtn" onclick="setMode('teach')">Teach me</button>
    </div>
    <div class="credit-counter">Cost: <span id="creditCost">0</span> credits</div>
  </div>
  <div class="body">
    <div class="left-panel">
      <div class="panel-header">
        <span class="panel-title">Your code</span>
        <span id="lineCount" style="font-size:11px;color:#444;">0 lines</span>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="code-input" id="codeInput" placeholder="Paste your code here..." oninput="updateLines()"></textarea>
      </div>
      <button class="run-btn" id="reviewBtn" onclick="runReview()">Review my code</button>
    </div>
    <div class="right-panel">
      <div class="panel-header">
        <span class="panel-title">Review</span>
        <span id="statusBadge" style="font-size:11px;color:#444;"></span>
      </div>
      <div id="outputBody" style="flex:1;display:flex;flex-direction:column;">
        <div class="placeholder"><p>Paste code and click review</p></div>
      </div>
    </div>
  </div>
  <div class="history-bar">
    <div class="history-title">Review history</div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No reviews yet</div>
    </div>
  </div>
  <div class="tos-bar">
    <span class="tos-link" onclick="openModal('tos')">Terms of Service</span>
    <span class="tos-link" onclick="openModal('privacy')">Privacy Policy</span>
    <span class="tos-link" onclick="openModal('cookies')">Cookie Policy</span>
  </div>
</div>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>
</div>

<script>
const LANGUAGES = [
  {name:'Python',tag:'General'},{name:'Python (Django)',tag:'Web'},{name:'Python (Flask)',tag:'Web'},{name:'Python (FastAPI)',tag:'Web'},
  {name:'JavaScript',tag:'General'},{name:'JavaScript (React)',tag:'Frontend'},{name:'JavaScript (Vue)',tag:'Frontend'},{name:'JavaScript (Node.js)',tag:'Backend'},{name:'JavaScript (Next.js)',tag:'Fullstack'},
  {name:'TypeScript',tag:'General'},{name:'TypeScript (React)',tag:'Frontend'},{name:'TypeScript (Node.js)',tag:'Backend'},
  {name:'Lua',tag:'General'},{name:'Lua (Roblox)',tag:'Game'},{name:'Lua (Love2D)',tag:'Game'},
  {name:'Java',tag:'General'},{name:'Java (Spring)',tag:'Backend'},{name:'Java (Android)',tag:'Mobile'},
  {name:'C++',tag:'General'},{name:'C++ (Unreal Engine)',tag:'Game'},
  {name:'C#',tag:'General'},{name:'C# (Unity)',tag:'Game'},{name:'C# (.NET)',tag:'Backend'},
  {name:'Swift (iOS)',tag:'Mobile'},{name:'Kotlin (Android)',tag:'Mobile'},
  {name:'Go',tag:'Backend'},{name:'Rust',tag:'Systems'},{name:'PHP',tag:'Backend'},{name:'Ruby (Rails)',tag:'Web'},
  {name:'SQL',tag:'Database'},{name:'HTML/CSS',tag:'Frontend'},{name:'Bash/Shell',tag:'DevOps'},
];

let selectedLang='Auto-detect', mode='fix', reviewHistory=[];

function openDropdown(){
  document.getElementById('langSearch').value='';
  document.getElementById('langSearch').placeholder='Search language...';
  filterLangs();
  document.getElementById('langDropdown').classList.add('open');
}
function closeDropdown(){document.getElementById('langDropdown').classList.remove('open');}
function filterLangs(){
  const q=document.getElementById('langSearch').value.toLowerCase();
  const dd=document.getElementById('langDropdown');
  const filtered=q?LANGUAGES.filter(l=>l.name.toLowerCase().includes(q)):LANGUAGES;
  const backBtn=selectedLang!=='Auto-detect'?`<div class="lang-option" style="color:#7c6fe0;border-bottom:0.5px solid #2a2a2e;" onmousedown="selectLang('Auto-detect','Auto-detect')">← All languages</div>`:'';
  dd.innerHTML=backBtn+`<div class="lang-option ${selectedLang==='Auto-detect'?'selected':''}" onmousedown="selectLang('Auto-detect','Auto-detect')">Auto-detect</div>`+
    filtered.map(l=>`<div class="lang-option ${selectedLang===l.name?'selected':''}" onmousedown="selectLang('${l.name}','${l.name}')"><span>${l.name}</span><span class="tag">${l.tag}</span></div>`).join('');
  dd.classList.add('open');
}
function selectLang(name,display){
  selectedLang=name;
  document.getElementById('langSearch').value=name==='Auto-detect'?'Auto-detect':display;
  document.getElementById('langSearch').placeholder=name==='Auto-detect'?'Auto-detect':display;
  closeDropdown();
}
function setMode(m){
  mode=m;
  document.getElementById('modeFixBtn').classList.toggle('active',m==='fix');
  document.getElementById('modeTeachBtn').classList.toggle('active',m==='teach');
}
function updateLines(){
  const ta=document.getElementById('codeInput');
  const ln=document.getElementById('lineNumbers');
  const lines=ta.value?ta.value.split('\n').length:1;
  ln.innerHTML=Array.from({length:lines},(_,i)=>i+1).join('<br>');
  document.getElementById('lineCount').textContent=lines+' lines';
  document.getElementById('creditCost').textContent=Math.ceil(lines/10);
}
function getGrade(scores){
  const s=Object.values(scores);
  const bad=s.filter(x=>x==='bad').length,warn=s.filter(x=>x==='warn').length;
  if(bad>=2)return'D';if(bad===1)return'C';if(warn>=2)return'C';if(warn===1)return'B';return'A';
}
function getGradeLabel(g){
  if(g==='A')return'Excellent — clean code!';if(g==='B')return'Good — minor issues found';
  if(g==='C')return'Fair — needs some work';return'Poor — significant issues';
}
function makeDiff(original,fixed){
  const ol=original.split('\n'),fl=fixed.split('\n');
  let html='';
  for(let i=0;i<fl.length;i++){
    const o=ol[i]||'',f=fl[i]||'';
    if(f!==o&&o)html+=`<div class="diff-line removed">${o.replace(/</g,'&lt;')}</div>`;
    if(f!==o)html+=`<div class="diff-line added">${f.replace(/</g,'&lt;')}</div>`;
    else html+=`<div class="diff-line normal">${f.replace(/</g,'&lt;')}</div>`;
  }
  return html;
}
function copyCode(id){
  const el=document.getElementById(id);
  const text=Array.from(el.querySelectorAll('.diff-line.added,.diff-line.normal')).map(d=>d.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector(`[data-copy="${id}"]`);
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}
  });
}
function renderHistory(){
  const el=document.getElementById('historyList');
  if(reviewHistory.length===0){el.innerHTML='<div class="empty-history">No reviews yet</div>';return;}
  el.innerHTML=reviewHistory.slice().reverse().map((h,i)=>`
    <div class="history-item" onclick="loadHistory(${reviewHistory.length-1-i})">
      <span class="history-grade" style="color:${h.grade==='A'?'#60c060':h.grade==='B'?'#60a0c0':h.grade==='C'?'#e0a040':'#f07070'}">${h.grade}</span>
      <span class="history-snippet">${h.snippet}</span>
      <span class="history-time">${h.time}</span>
    </div>`).join('');
}
function loadHistory(i){
  const h=reviewHistory[i];
  document.getElementById('codeInput').value=h.code;
  updateLines();renderResult(h.result,h.code);
}
function renderResult(result,originalCode){
  const grade=getGrade(result.scores);
  const sc=s=>s==='good'?'good':s==='warn'?'warn':'bad';
  const sl=(s,l)=>`<span class="score-pill ${sc(s)}">${l}: ${s==='good'?'ok':s==='warn'?'warning':'issue'}</span>`;
  const fixedId='fixed_'+Date.now();
  const diffHtml=makeDiff(originalCode||'',result.fixed);
  const explainSection=mode==='teach'&&result.explanation?`
    <div class="section explain"><div class="section-head"><span class="dot dot-blue"></span>Explanation</div><div class="section-body">${result.explanation}</div></div>`:'';
  document.getElementById('outputBody').innerHTML=`
    <div class="result-body">
      <div class="grade-card">
        <div class="grade-circle grade-${grade}">${grade}</div>
        <div><div class="grade-label">${getGradeLabel(grade)}</div>
        <div class="score-row">${sl(result.scores.bugs,'Bugs')}${sl(result.scores.security,'Security')}${sl(result.scores.performance,'Performance')}</div></div>
      </div>
      <div class="section bugs"><div class="section-head"><span class="dot dot-red"></span>Bugs</div><div class="section-body">${result.bugs}</div></div>
      <div class="section security"><div class="section-head"><span class="dot dot-amber"></span>Security</div><div class="section-body">${result.security}</div></div>
      <div class="section perf"><div class="section-head"><span class="dot dot-green"></span>Performance</div><div class="section-body">${result.performance}</div></div>
      ${explainSection}
      <div class="section">
        <div class="fixed-head"><span style="display:flex;align-items:center;gap:6px;"><span class="dot dot-purple"></span>Fixed code (diff)</span><button class="copy-btn" data-copy="${fixedId}" onclick="copyCode('${fixedId}')">Copy</button></div>
        <div class="fixed-body" id="${fixedId}">${diffHtml}</div>
      </div>
    </div>`;
  document.getElementById('statusBadge').textContent='Grade: '+grade;
  document.getElementById('statusBadge').style.color=grade==='A'?'#60c060':grade==='B'?'#60a0c0':grade==='C'?'#e0a040':'#f07070';
}
async function runReview(){
  const code=document.getElementById('codeInput').value.trim();
  const btn=document.getElementById('reviewBtn');
  if(!code){alert('Paste some code first!');return;}
  btn.disabled=true;btn.textContent='Reviewing...';
  document.getElementById('outputBody').innerHTML='<div class="loading"><div class="spinner"></div><p>Analyzing your code...</p></div>';
  try{
    const res=await fetch('/api/review',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,lang:selectedLang,mode})
    });
    const result=await res.json();
    if(result.error)throw new Error(result.error);
    renderResult(result,code);
    const grade=getGrade(result.scores);
    reviewHistory.push({code,result,grade,snippet:code.split('\n')[0].slice(0,40),time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    renderHistory();
  }catch(e){
    document.getElementById('outputBody').innerHTML=`<div class="placeholder"><p style="color:#f07070;">Error: ${e.message}</p></div>`;
  }
  btn.disabled=false;btn.textContent='Review my code';
}
const MODALS={
  tos:{title:'Terms of Service',content:`<p>By using CodeReviewAI you agree to these terms. This service is provided as-is for code review purposes only.</p><p>You may not use this service for illegal purposes. AI-generated code reviews are suggestions only — always verify before using in production.</p><p>Your code is sent to Anthropic's API for processing. We are not responsible for any damages arising from the use of this service.</p><p>We reserve the right to terminate access to anyone who misuses the service.</p>`},
  privacy:{title:'Privacy Policy',content:`<p>We take your privacy seriously.</p><p>Your code is sent to Anthropic's API to generate reviews. We do not store your code or your API key on our servers.</p><p>We collect basic usage analytics to improve the service. No personal data is collected without your consent.</p><p>We do not sell your data to third parties. Ever.</p>`},
  cookies:{title:'Cookie Policy',content:`<p>This site uses minimal cookies for basic functionality only.</p><p>We do not use advertising or tracking cookies. No third party cookies are set without your knowledge.</p><p>You can disable cookies in your browser settings at any time.</p>`}
};
function openModal(type){
  const m=MODALS[type];
  document.getElementById('modalTitle').textContent=m.title;
  document.getElementById('modalContent').innerHTML=m.content;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
updateLines();filterLangs();
