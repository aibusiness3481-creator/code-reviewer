<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MergeSense</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0c; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.app-wrap { position: relative; width: 100%; max-width: 1100px; }
.app { background: #0d0d0f; border-radius: 12px; overflow: hidden; border: 0.5px solid #2a2a2e; }
.topbar { display: flex; align-items: center; gap: 0px; padding: 8px 20px; border-bottom: 0.5px solid #2a2a2e; background: #111114; }
.logo { font-size: 14px; font-weight: 500; color: #e8e8f0; }
.logo span { color: #7c6fe0; }
.badge { font-size: 11px; padding: 2px 8px; background: #1e1b3a; color: #a89ff0; border-radius: 20px; border: 0.5px solid #3d3680; }

.toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid #2a2a2e; background: #0f0f12; flex-wrap: wrap; }
.lang-wrap { position: relative; flex: 1; min-width: 180px; }
.lang-search { width: 100%; background: #1a1a1e; color: #c9d1d9; border: 0.5px solid #2a2a2e; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; }
.lang-search:focus { border-color: #7c6fe0; }
.lang-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1e; border: 0.5px solid #2a2a2e; border-radius: 6px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
.lang-dropdown.open { display: block; }
.lang-option { padding: 7px 10px; font-size: 12px; color: #a0a0b0; cursor: pointer; }
.lang-option:hover, .lang-option.selected { background: #2a2550; color: #c9d1d9; }
.lang-option .tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; background: #1e1b3a; color: #7c6fe0; }

.body { display: grid; grid-template-columns: 1fr 1fr; min-height: unset; }
.left-panel { display: flex; flex-direction: column; border-right: 0.5px solid #2a2a2e; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 0.5px solid #2a2a2e; background: #111114; }
.panel-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.editor-wrap { flex: 1; display: flex; overflow: hidden; min-height: calc(100vh - 280px); max-height: calc(100vh - 280px); }
.line-numbers { padding: 16px 8px 16px 12px; background: #0a0a0c; color: #333; font-family: monospace; font-size: 13px; line-height: 1.6; text-align: right; user-select: none; min-width: 36px; border-right: 0.5px solid #1a1a1e; }
.code-input { flex: 1; background: #0d0d0f; color: #c9d1d9; font-family: monospace; font-size: 13px; line-height: 1.6; border: none; outline: none; resize: none; padding: 16px; }
.code-input::placeholder { color: #3a3a4a; }
.run-btn { margin: 12px 16px; padding: 10px 0; background: #7c6fe0; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.run-btn:hover { background: #9283f0; }
.run-btn:disabled { background: #3a3460; color: #7070a0; cursor: not-allowed; }
.right-panel { display: flex; flex-direction: column; overflow-y: auto; background: #0d0d0f; min-height: unset; }
.placeholder { flex: 1; display: flex; align-items: center; justify-content: center; }
.placeholder p { font-size: 13px; color: #333; }
.loading { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid #2a2a2e; border-top-color: #7c6fe0; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: #555; }
.result-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.grade-card { border-radius: 10px; border: 0.5px solid #2a2a2e; padding: 14px 16px; display: flex; align-items: center; gap: 16px; background: #111114; }
.grade-circle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 500; flex-shrink: 0; }
.grade-A { background: #0f2010; color: #60c060; border: 1.5px solid #1e4020; }
.grade-B { background: #0e1a20; color: #60a0c0; border: 1.5px solid #1a3040; }
.grade-C { background: #1e1510; color: #e0a040; border: 1.5px solid #3d2a10; }
.grade-D { background: #1e1010; color: #f07070; border: 1.5px solid #3d1515; }
.grade-label { font-size: 13px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
.score-row { display: flex; gap: 8px; flex-wrap: wrap; }
.score-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.score-pill.good { background: #0f2010; color: #60c060; border: 0.5px solid #1e4020; }
.score-pill.warn { background: #1e1510; color: #e0a040; border: 0.5px solid #3d2a10; }
.score-pill.bad { background: #1e1010; color: #f07070; border: 0.5px solid #3d1515; }
.section { border-radius: 8px; overflow: hidden; border: 0.5px solid #2a2a2e; }
.section-head { padding: 8px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.section-body { padding: 12px; font-size: 13px; line-height: 1.6; color: #b0b0c0; }
.bugs .section-head { background: #1e1212; color: #f07070; }
.security .section-head { background: #1a1510; color: #e0a040; }
.perf .section-head { background: #0f1a10; color: #60c060; }
.explain .section-head { background: #101520; color: #60a0e0; }
.fixed-head { padding: 8px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; background: #111220; color: #7c6fe0; }
.copy-btn { font-size: 11px; padding: 3px 10px; background: #1e1b3a; color: #a89ff0; border: 0.5px solid #3d3680; border-radius: 6px; cursor: pointer; }
.copy-btn:hover { background: #2a2550; }
.fixed-body { font-family: monospace; font-size: 12px; background: #111114; white-space: pre-wrap; word-break: break-word; }
.diff-line { padding: 1px 12px; font-family: monospace; font-size: 12px; line-height: 1.6; }
.diff-line.added { background: #0d1f0d; color: #80c080; }
.diff-line.removed { background: #1f0d0d; color: #c08080; text-decoration: line-through; opacity: 0.6; }
.diff-line.normal { color: #c9d1d9; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot-red { background: #f07070; } .dot-amber { background: #e0a040; } .dot-green { background: #60c060; } .dot-purple { background: #7c6fe0; } .dot-blue { background: #60a0e0; }
.history-bar { border-top: 0.5px solid #2a2a2e; background: #0a0a0c; }
.history-title { padding: 8px 16px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 0.5px solid #1a1a1e; }
.history-list { display: flex; flex-direction: column; max-height: 120px; overflow-y: auto; }
.history-item { padding: 8px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 0.5px solid #1a1a1e; }
.history-item:hover { background: #111114; }
.history-grade { font-size: 12px; font-weight: 500; width: 20px; }
.history-snippet { font-size: 12px; color: #555; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-size: 11px; color: #333; }
.empty-history { padding: 12px 16px; font-size: 12px; color: #333; }
.tos-bar { border-top: 0.5px solid #2a2a2e; padding: 10px 16px; background: #0a0a0c; display: flex; align-items: center; justify-content: center; gap: 16px; }
.tos-link { font-size: 11px; color: #333; cursor: pointer; text-decoration: underline; }
.tos-link:hover { color: #666; }
.risk-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
.risk-low { background: #0f2010; color: #60c060; border: 0.5px solid #1e4020; }
.risk-medium { background: #1e1510; color: #e0a040; border: 0.5px solid #3d2a10; }
.risk-high { background: #1e1010; color: #f07070; border: 0.5px solid #3d1515; }
.risk-critical { background: #2a0a0a; color: #ff4444; border: 0.5px solid #5a1010; }
.collapsible-head { cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.collapsible-head:hover { opacity: 0.85; }
.collapse-icon { font-size: 10px; color: #555; transition: transform 0.2s; }
.collapse-icon.open { transform: rotate(180deg); }
.collapsible-body { display: none; }
.collapsible-body.open { display: block; }
.priority-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; font-weight: 600; }
.p0-tag { background: #2a0a0a; color: #ff4444; }
.p1-tag { background: #1e1510; color: #e0a040; }
.p2-tag { background: #0f1a10; color: #60c060; }
.auth-btn { font-size: 12px; padding: 6px 14px; background: #1e1b3a; color: #a89ff0; border: 0.5px solid #3d3680; border-radius: 6px; cursor: pointer; margin-left: auto; }
.auth-btn:hover { background: #2a2550; }
.auth-input { width: 100%; background: #1a1a1e; color: #c9d1d9; border: 0.5px solid #2a2a2e; border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 10px; }
.auth-input:focus { border-color: #7c6fe0; }
.auth-error { font-size: 12px; color: #f07070; margin-bottom: 8px; }
.auth-switch { font-size: 12px; color: #555; margin-top: 10px; text-align: center; cursor: pointer; }
.auth-switch span { color: #a89ff0; text-decoration: underline; }
.modal { background: #111114; border: 0.5px solid #2a2a2e; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto; }
.modal h2 { font-size: 15px; color: #e0e0e0; margin-bottom: 12px; font-weight: 500; }
.modal p { font-size: 13px; color: #888; line-height: 1.7; margin-bottom: 10px; }
.modal-close { margin-top: 16px; padding: 8px 20px; background: #7c6fe0; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
@media (max-width: 700px) {
  .body { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 0.5px solid #2a2a2e; }
  .right-panel { min-height: 300px; }
}
</style>
</head>
<body>
<div class="app-wrap">
<div class="app">
  <div class="topbar">
    <svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg" style="margin-right:10px;">
      <rect x="1" y="4" width="42" height="42" rx="8" fill="#1e1b3a" stroke="#7c6fe0" stroke-width="1.5"/>
      <circle cx="14" cy="20" r="5" fill="#7c6fe0"/>
      <circle cx="30" cy="32" r="5" fill="#a89ff0"/>
      <line x1="14" y1="20" x2="30" y2="32" stroke="#7c6fe0" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="52" y="26" font-family="system-ui" font-size="18" font-weight="500" fill="#e8e8f0">MergeSense</text>
      <text x="52" y="44" font-family="system-ui" font-size="11" font-weight="400" fill="#555">pre-merge AI</text>
    </svg>
    <div class="badge">powered by Claude</div>
    <button class="auth-btn" id="authBtn" onclick="openAuthModal()">Sign in</button>
  </div>
  <div class="toolbar">
    <div class="lang-wrap">
      <input class="lang-search" id="langSearch" placeholder="Search language... (e.g. python, react, roblox)" autocomplete="off" onfocus="openDropdown()" oninput="filterLangs()" onblur="" />
      <div class="lang-dropdown" id="langDropdown"></div>
    </div>
  </div>
  <div class="body">
    <div class="left-panel">
      <div class="panel-header">
        <span class="panel-title">Main Branch</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="lineCount" style="font-size:11px;color:#444;">0 lines</span>
          <button class="copy-btn" onclick="document.getElementById('mainUpload').click()">+ Upload</button>
          <input type="file" id="mainUpload" multiple accept=".js,.ts,.py,.java,.cpp,.c,.cs,.go,.rs,.php,.rb,.lua,.html,.css,.sh,.sql,.json,.txt" style="display:none;" onchange="handleUpload(this,'codeInput')"/>
        </div>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="code-input" id="codeInput" placeholder="Paste your main branch code here..." oninput="updateLines()"></textarea>
      </div>
    </div>
    <div class="right-panel" style="border-right:0.5px solid #2a2a2e;">
      <div class="panel-header">
        <span class="panel-title">Pull Request</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="copy-btn" onclick="document.getElementById('prUpload').click()">+ Upload</button>
          <input type="file" id="prUpload" multiple accept=".js,.ts,.py,.java,.cpp,.c,.cs,.go,.rs,.php,.rb,.lua,.html,.css,.sh,.sql,.json,.txt" style="display:none;" onchange="handleUpload(this,'prInput')"/>
        </div>
      </div>
      <div class="editor-wrap">
        <textarea class="code-input" id="prInput" placeholder="Paste your PR code here..."></textarea>
      </div>
    </div>
  </div>
  <div style="padding:12px 16px;border-top:0.5px solid #2a2a2e;background:#0d0d0f;display:flex;align-items:center;justify-content:center;gap:10px;">
    <svg width="28" height="28" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <rect x="1" y="1" width="40" height="40" rx="8" fill="#1e1b3a" stroke="#7c6fe0" stroke-width="1.5"/>
      <circle cx="13" cy="16" r="5" fill="#7c6fe0"/>
      <circle cx="29" cy="28" r="5" fill="#a89ff0"/>
      <line x1="13" y1="16" x2="29" y2="28" stroke="#7c6fe0" stroke-width="1.5" stroke-dasharray="3,2"/>
    </svg>
    <button class="run-btn" id="reviewBtn" onclick="runReview()" style="margin:0;width:calc(50% + 115px);padding:14px 0;font-size:15px;">Simulate Merge</button>
  </div>
  <div style="border-top:0.5px solid #2a2a2e;" id="reportSection" style="display:none;">
    <div class="panel-header">
      <span class="panel-title">Simulation Report</span>
      <span id="statusBadge" style="font-size:11px;color:#444;"></span>
    </div>
    <div id="outputBody" style="min-height:200px;display:flex;flex-direction:column;background:#0d0d0f;border:0.5px solid #2a2a2e;border-radius:10px;margin:12px 16px;">
      <div class="placeholder"><p>Paste both code branches and click Simulate Merge</p></div>
    </div>
  </div>
  <div class="history-bar" id="historySection" style="display:none;">
    <div class="history-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Simulation history</span>
      <span class="tos-link" onclick="clearHistory()" style="font-size:11px;color:#555;margin-right:16px;">Clear history</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No simulations yet</div>
    </div>
  </div>
  <div class="tos-bar">
    <span class="tos-link" onclick="openModal('tos')">Terms of Service</span>
    <span class="tos-link" onclick="openModal('privacy')">Privacy Policy</span>
    <span class="tos-link" onclick="openModal('cookies')">Cookie Policy</span>
  </div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>
<div class="modal-bg" id="authModalBg" onclick="if(event.target===this)closeAuthModal()">
  <div class="modal" style="max-width:360px;">
    <h2 id="authModalTitle">Sign in</h2>
    <div id="authError" class="auth-error" style="display:none;"></div>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email" />
    <input class="auth-input" id="authPassword" type="password" placeholder="Password" />
    <button class="run-btn" id="authSubmitBtn" onclick="submitAuth()" style="margin:0;width:100%;padding:10px 0;">Sign in</button>
    <div class="auth-switch" id="authSwitch">No account? <span onclick="toggleAuthMode()">Sign up</span></div>
  </div>
</div>
</div>

<script>
const LANGUAGES = [
  {name:'Python',tag:'General'},{name:'Python (Django)',tag:'Web'},{name:'Python (Flask)',tag:'Web'},{name:'Python (FastAPI)',tag:'Web'},
  {name:'JavaScript',tag:'General'},{name:'JavaScript (React)',tag:'Frontend'},{name:'JavaScript (Vue)',tag:'Frontend'},{name:'JavaScript (Node.js)',tag:'Backend'},{name:'JavaScript (Next.js)',tag:'Fullstack'},
  {name:'TypeScript',tag:'General'},{name:'TypeScript (React)',tag:'Frontend'},{name:'TypeScript (Node.js)',tag:'Backend'},
  {name:'Lua',tag:'General'},{name:'Lua (Roblox)',tag:'Game'},{name:'Lua (Love2D)',tag:'Game'},
  {name:'Java',tag:'General'},{name:'Java (Spring)',tag:'Backend'},{name:'Java (Android)',tag:'Mobile'},
  {name:'C++',tag:'General'},{name:'C++ (Unreal Engine)',tag:'Game'},
  {name:'C#',tag:'General'},{name:'C# (Unity)',tag:'Game'},{name:'C# (.NET)',tag:'Backend'},
  {name:'Swift (iOS)',tag:'Mobile'},{name:'Kotlin (Android)',tag:'Mobile'},
  {name:'Go',tag:'Backend'},{name:'Rust',tag:'Systems'},{name:'PHP',tag:'Backend'},{name:'Ruby (Rails)',tag:'Web'},
  {name:'SQL',tag:'Database'},{name:'HTML/CSS',tag:'Frontend'},{name:'Bash/Shell',tag:'DevOps'},
];

let selectedLang='Auto-detect', reviewHistory=[], showingVariations=false, currentBase='';

const BASE_LANGS=['Python','JavaScript','TypeScript','Lua','Java','C++','C#','Swift','Kotlin','Go','Rust','PHP','Ruby','SQL','HTML/CSS','Bash/Shell'];

function getBase(name){ return BASE_LANGS.find(b=>name.startsWith(b))||name; }

function openDropdown(){
  showingVariations=false;
  currentBase='';
  document.getElementById('langSearch').value='';
  document.getElementById('langSearch').placeholder='Search language...';
  renderDropdown();
  document.getElementById('langDropdown').classList.add('open');
}
function closeDropdown(){document.getElementById('langDropdown').classList.remove('open');}

function renderDropdown(){
  const dd=document.getElementById('langDropdown');
  const q=document.getElementById('langSearch').value.toLowerCase().trim();

  if(showingVariations){
    const variations=LANGUAGES.filter(l=>getBase(l.name)===currentBase);
    dd.innerHTML=`<div class="lang-option" style="color:#7c6fe0;border-bottom:0.5px solid #2a2a2e;" onmousedown="showAllLangs()">← All languages</div>`+
      variations.map(l=>`<div class="lang-option ${selectedLang===l.name?'selected':''}" onmousedown="selectLang('${l.name}','${l.name}')"><span>${l.name}</span><span class="tag">${l.tag}</span></div>`).join('');
    return;
  }

  if(q){
    const filtered=LANGUAGES.filter(l=>l.name.toLowerCase().includes(q));
    dd.innerHTML=`<div class="lang-option ${selectedLang==='Auto-detect'?'selected':''}" onmousedown="selectLang('Auto-detect','Auto-detect')">Auto-detect</div>`+
      filtered.map(l=>`<div class="lang-option ${selectedLang===l.name?'selected':''}" onmousedown="selectLang('${l.name}','${l.name}')"><span>${l.name}</span><span class="tag">${l.tag}</span></div>`).join('');
    return;
  }

  const bases=BASE_LANGS.filter(b=>LANGUAGES.some(l=>getBase(l.name)===b));
  dd.innerHTML=`<div class="lang-option ${selectedLang==='Auto-detect'?'selected':''}" onmousedown="selectLang('Auto-detect','Auto-detect')">Auto-detect</div>`+
    bases.map(b=>{
      const vars=LANGUAGES.filter(l=>getBase(l.name)===b);
      const hasVars=vars.length>1;
      return `<div class="lang-option" onmousedown="${hasVars?`showVariations('${b}')`:`selectLang('${vars[0].name}','${vars[0].name}')`}">
        <span>${b}</span>
        ${hasVars?`<span class="tag">${vars.length} variants →</span>`:`<span class="tag">${vars[0].tag}</span>`}
      </div>`;
    }).join('');
}

function showVariations(base){
  showingVariations=true;
  currentBase=base;
  renderDropdown();
}

function showAllLangs(){
  showingVariations=false;
  currentBase='';
  document.getElementById('langSearch').value='';
  renderDropdown();
}

function filterLangs(){
  renderDropdown();
  document.getElementById('langDropdown').classList.add('open');
}
function selectLang(name,display){
  selectedLang=name;
  showingVariations=false;
  document.getElementById('langSearch').value=name==='Auto-detect'?'Auto-detect':display;
  document.getElementById('langSearch').placeholder=name==='Auto-detect'?'Auto-detect':display;
  closeDropdown();
}
function setMode(m){
  mode=m;
  document.getElementById('modeFixBtn').classList.toggle('active',m==='fix');
  document.getElementById('modeTeachBtn').classList.toggle('active',m==='teach');
}
function updateLines(){
  const ta=document.getElementById('codeInput');
  const ln=document.getElementById('lineNumbers');
  const lines=ta.value?ta.value.split('\n').length:1;
  ln.innerHTML=Array.from({length:lines},(_,i)=>i+1).join('<br>');
  document.getElementById('lineCount').textContent=lines+' lines';
  document.getElementById('creditCost').textContent=Math.ceil(lines/10);
}
function getGrade(scores){
  const s=Object.values(scores);
  const bad=s.filter(x=>x==='bad').length,warn=s.filter(x=>x==='warn').length;
  if(bad>=2)return'D';if(bad===1)return'C';if(warn>=2)return'C';if(warn===1)return'B';return'A';
}
function getGradeLabel(g){
  if(g==='A')return'Excellent — clean code!';if(g==='B')return'Good — minor issues found';
  if(g==='C')return'Fair — needs some work';return'Poor — significant issues';
}
function makeDiff(original,fixed){
  const ol=original.split('\n'),fl=fixed.split('\n');
  let html='';
  for(let i=0;i<fl.length;i++){
    const o=ol[i]||'',f=fl[i]||'';
    if(f!==o&&o)html+=`<div class="diff-line removed">${o.replace(/</g,'&lt;')}</div>`;
    if(f!==o)html+=`<div class="diff-line added">${f.replace(/</g,'&lt;')}</div>`;
    else html+=`<div class="diff-line normal">${f.replace(/</g,'&lt;')}</div>`;
  }
  return html;
}
function copyCode(id){
  const el=document.getElementById(id);
  const text=Array.from(el.querySelectorAll('.diff-line.added,.diff-line.normal')).map(d=>d.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector(`[data-copy="${id}"]`);
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}
  });
}
function renderHistory(){
  const el=document.getElementById('historyList');
  if(reviewHistory.length===0){el.innerHTML='<div class="empty-history">No simulations yet</div>';return;}
  el.innerHTML=reviewHistory.slice().reverse().map((h,i)=>{
    const risk=getRiskLabel(getGrade(h.result.scores));
    return`<div class="history-item" onclick="loadHistory(${reviewHistory.length-1-i})">
      <span class="history-grade" style="color:${risk.cls==='risk-low'?'#60c060':risk.cls==='risk-medium'?'#60a0c0':risk.cls==='risk-high'?'#e0a040':'#ff4444'}">${risk.text}</span>
      <span class="history-snippet">${h.snippet}</span>
      <span class="history-time">${h.time}</span>
    </div>`;
  }).join('');
}
function loadHistory(i){
  const h=reviewHistory[i];
  document.getElementById('codeInput').value=h.main;
  document.getElementById('prInput').value=h.pr;
  updateLines();
  document.getElementById('reportSection').style.display='block';
  document.getElementById('historySection').style.display='block';
  renderResult(h.result,h.main);
}
function clearHistory(){
  reviewHistory=[];
  document.getElementById('historySection').style.display='none';
  renderHistory();
}
function getRiskLabel(grade){
  if(grade==='A')return{text:'Low Risk',cls:'risk-low'};
  if(grade==='B')return{text:'Medium Risk',cls:'risk-medium'};
  if(grade==='C')return{text:'High Risk',cls:'risk-high'};
  return{text:'Critical Risk',cls:'risk-critical'};
}
function toggleCollapse(id){
  const body=document.getElementById('cb_'+id);
  const icon=document.getElementById('ci_'+id);
  body.classList.toggle('open');
  icon.classList.toggle('open');
}
function getVerdict(grade){
  if(grade==='A')return{text:'SAFE TO MERGE',score:10,bg:'#0f2010',color:'#60c060',border:'#1e4020'};
  if(grade==='B')return{text:'CAUTION',score:35,bg:'#1e1510',color:'#e0a040',border:'#3d2a10'};
  if(grade==='C')return{text:'DO NOT MERGE',score:65,bg:'#1e1010',color:'#f07070',border:'#3d1515'};
  return{text:'DO NOT MERGE',score:85,bg:'#2a0a0a',color:'#ff4444',border:'#5a1010'};
}
function renderResult(result,originalCode){
  const grade=getGrade(result.scores);
  const risk=getRiskLabel(grade);
  const verdict=getVerdict(grade);
  const sc=s=>s==='good'?'good':s==='warn'?'warn':'bad';
  const sl=(s,l)=>`<span class="score-pill ${sc(s)}">${l}: ${s==='good'?'ok':s==='warn'?'warning':'issue'}</span>`;
  const fixedId='fixed_'+Date.now();
  const diffHtml=makeDiff(originalCode||'',result.fixed);
  document.getElementById('outputBody').innerHTML=`
    <div class="result-body">
      <div style="background:${verdict.bg};border:0.5px solid ${verdict.border};border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:18px;font-weight:700;color:${verdict.color};letter-spacing:0.05em;">${verdict.text}</span>
        <span style="font-size:12px;color:${verdict.color};opacity:0.7;">Risk Score: ${verdict.score}/100</span>
      </div>
      <div class="grade-card">
        <div class="grade-circle grade-${grade}">${grade}</div>
        <div>
          <span class="risk-label ${risk.cls}">${risk.text}</span>
          <div class="grade-label">${getGradeLabel(grade)}</div>
          <div class="score-row">${sl(result.scores.bugs,'Bugs')}${sl(result.scores.security,'Security')}${sl(result.scores.performance,'Performance')}</div>
        </div>
      </div>
      <div class="section bugs">
        <div class="section-head"><span class="dot dot-red"></span>Bugs<span class="priority-tag p0-tag">P0</span></div>
        <div class="section-body">${result.bugs}</div>
      </div>
      <div class="section security">
        <div class="section-head"><span class="dot dot-amber"></span>Security<span class="priority-tag p0-tag">P0</span></div>
        <div class="section-body">${result.security}</div>
      </div>
      <div class="section perf">
        <div class="section-head collapsible-head" onclick="toggleCollapse('perf')">
          <span style="display:flex;align-items:center;gap:6px;"><span class="dot dot-green"></span>Performance<span class="priority-tag p1-tag">P1</span></span>
          <span class="collapse-icon" id="ci_perf">▼</span>
        </div>
        <div class="section-body collapsible-body" id="cb_perf">${result.performance}</div>
      </div>
      ${''}
      <div class="section">
        <div class="fixed-head collapsible-head" onclick="toggleCollapse('fix')">
          <span style="display:flex;align-items:center;gap:6px;"><span class="dot dot-purple"></span>Fixed code (diff)<span class="priority-tag p1-tag">P1</span></span>
          <span style="display:flex;align-items:center;gap:8px;"><button class="copy-btn" data-copy="${fixedId}" onclick="event.stopPropagation();copyCode('${fixedId}')">Copy</button><span class="collapse-icon" id="ci_fix">▼</span></span>
        </div>
        <div class="fixed-body collapsible-body open" id="cb_fix"><div id="${fixedId}">${diffHtml}</div></div>
      </div>
    </div>`;
  document.getElementById('statusBadge').textContent=risk.text;
  document.getElementById('statusBadge').style.color=grade==='A'?'#60c060':grade==='B'?'#60a0c0':grade==='C'?'#e0a040':'#ff4444';
}
async function runReview(){
  const code=document.getElementById('codeInput').value.trim();
  const prCode=document.getElementById('prInput').value.trim();
  const btn=document.getElementById('reviewBtn');
  if(!code){alert('Paste your main branch code first!');return;}
  if(!prCode){alert('Paste your PR code first!');return;}
  btn.disabled=true;btn.textContent='Simulating...';
  document.getElementById('reportSection').style.display='block';
  document.getElementById('outputBody').innerHTML='<div class="loading"><div class="spinner"></div><p>Simulating merge...</p></div>';
  try{
    const res=await fetch('/api/review',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:`MAIN BRANCH:\n${code}\n\nPULL REQUEST:\n${prCode}`,lang:selectedLang,mode:'fix'})
    });
    const result=await res.json();
    if(result.error)throw new Error(result.error);
    renderResult(result,code);
    document.getElementById('reportSection').style.display='block';
    document.getElementById('historySection').style.display='block';
    const grade=getGrade(result.scores);
    reviewHistory.push({main:code,pr:prCode,result,grade,snippet:code.split('\n')[0].slice(0,40),time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    if(reviewHistory.length>10)reviewHistory.shift();
    renderHistory();
    if(currentUser){
      fetch('/api/history',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,main_code:code,pr_code:prCode,result})});
    }
  }catch(e){
    document.getElementById('outputBody').innerHTML=`<div class="placeholder"><p style="color:#f07070;">Error: ${e.message}</p></div>`;
  }
  btn.disabled=false;btn.textContent='Simulate Merge';
}
const MODALS={
  tos:{title:'Terms of Service',content:`<p>By using CodeReviewAI you agree to these terms. This service is provided as-is for code review purposes only.</p><p>You may not use this service for illegal purposes. AI-generated code reviews are suggestions only — always verify before using in production.</p><p>Your code is sent to Anthropic's API for processing. We are not responsible for any damages arising from the use of this service.</p><p>We reserve the right to terminate access to anyone who misuses the service.</p>`},
  privacy:{title:'Privacy Policy',content:`<p>We take your privacy seriously.</p><p>Your code is sent to Anthropic's API to generate reviews. We do not store your code or your API key on our servers.</p><p>We collect basic usage analytics to improve the service. No personal data is collected without your consent.</p><p>We do not sell your data to third parties. Ever.</p>`},
  cookies:{title:'Cookie Policy',content:`<p>This site uses minimal cookies for basic functionality only.</p><p>We do not use advertising or tracking cookies. No third party cookies are set without your knowledge.</p><p>You can disable cookies in your browser settings at any time.</p>`}
};
function openModal(type){
  const m=MODALS[type];
  document.getElementById('modalTitle').textContent=m.title;
  document.getElementById('modalContent').innerHTML=m.content;
  document.getElementById('modalBg').classList.add('open');
}
function handleUpload(input, targetId){
  const files=Array.from(input.files);
  if(!files.length)return;
  let pending=files.length;
  const chunks=[];
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      chunks.push(`--- file: ${file.name} ---\n${e.target.result}`);
      if(--pending===0){
        const ta=document.getElementById(targetId);
        ta.value=(ta.value?ta.value+'\n\n':'')+chunks.join('\n\n');
        updateLines();
      }
    };
    reader.readAsText(file);
  });
  input.value='';
}
// Auth
let currentUser = JSON.parse(localStorage.getItem('ms_user') || 'null');
let authMode = 'login';

function openAuthModal(){
  if(currentUser){ logout(); return; }
  document.getElementById('authModalBg').classList.add('open');
}
function closeAuthModal(){
  document.getElementById('authModalBg').classList.remove('open');
  document.getElementById('authError').style.display='none';
  document.getElementById('authEmail').value='';
  document.getElementById('authPassword').value='';
}
function toggleAuthMode(){
  authMode = authMode==='login'?'signup':'login';
  document.getElementById('authModalTitle').textContent = authMode==='login'?'Sign in':'Sign up';
  document.getElementById('authSubmitBtn').textContent = authMode==='login'?'Sign in':'Sign up';
  document.getElementById('authSwitch').innerHTML = authMode==='login'?'No account? <span onclick="toggleAuthMode()">Sign up</span>':'Have an account? <span onclick="toggleAuthMode()">Sign in</span>';
  document.getElementById('authError').style.display='none';
}
async function submitAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const password=document.getElementById('authPassword').value.trim();
  const errEl=document.getElementById('authError');
  if(!email||!password){errEl.textContent='Email and password required.';errEl.style.display='block';return;}
  const btn=document.getElementById('authSubmitBtn');
  btn.disabled=true;btn.textContent='Please wait...';
  try{
    const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:authMode,email,password})});
    const data=await res.json();
    if(data.error){errEl.textContent=data.error;errEl.style.display='block';}
    else{
      currentUser=data.user;
      localStorage.setItem('ms_user',JSON.stringify(currentUser));
      updateAuthUI();
      closeAuthModal();
      loadUserHistory();
    }
  }catch(e){errEl.textContent='Something went wrong.';errEl.style.display='block';}
  btn.disabled=false;btn.textContent=authMode==='login'?'Sign in':'Sign up';
}
function logout(){
  currentUser=null;
  localStorage.removeItem('ms_user');
  reviewHistory=[];
  renderHistory();
  updateAuthUI();
}
function updateAuthUI(){
  const btn=document.getElementById('authBtn');
  btn.textContent=currentUser?`Sign out (${currentUser.email})`:'Sign in';
}
async function loadUserHistory(){
  if(!currentUser)return;
  try{
    const res=await fetch(`/api/history?user_id=${currentUser.id}`);
    const data=await res.json();
    if(data.history&&data.history.length){
      reviewHistory=data.history.map(h=>({main:h.main_code,pr:h.pr_code,result:h.result,grade:getGrade(h.result.scores),snippet:(h.main_code||'').split('\n')[0].slice(0,40),time:new Date(h.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}));
      document.getElementById('historySection').style.display='block';
      renderHistory();
    }
  }catch(e){}
}
if(currentUser){updateAuthUI();loadUserHistory();}

function closeModal(){document.getElementById('modalBg').classList.remove('open');}
updateLines();renderDropdown();
document.addEventListener('click', function(e){
  const wrap = document.querySelector('.lang-wrap');
  if(wrap && !wrap.contains(e.target)) closeDropdown();
});
</script>
